name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: mvn clean package

      - name: Test
        run: mvn test

      - name: Build Docker
        run: docker build -t app .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Tag Image
        run: docker tag app:latest 486471633519.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

      - name: Push Image
        run: docker push 486471633519.dkr.ecr.ap-south-1.amazonaws.com/my-app:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-south-1 --name my-cluster

      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment.yaml --validate=false
          kubectl apply -f service.yaml --validate=false
        
      - name: Wait for deployment rollout
        run: kubectl rollout status deployment/springboot-app --timeout=180s
        
      # 🚨 DEBUG STEP (runs ONLY if above step fails)
      - name: Debug Pods (on failure) 
        if: failure()
        run: |
          echo "=== POD STATUS ==="
          kubectl get pods -o wide
          echo "=== DESCRIBE POD ==="
          kubectl describe pods
          echo "=== POD LOGS ==="
          kubectl logs -l app=springboot-app --all-containers=true

      - name: Verify Kubernetes resources
        run: |
            kubectl get pods -o wide
            kubectl get svc

      - name: Get External IP
        run: |
            for i in {1..30}; do
            IP=$(kubectl get svc springboot-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$IP" ]; then
            echo "SERVICE_URL=http://$IP" >> $GITHUB_ENV
            exit 0
            fi
            sleep 10
            done
            exit 1

      - name: Test Application
        run: curl -f $SERVICE_URL/products